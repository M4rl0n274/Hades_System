{% extends 'layout.html' %}

{% block contenido %}
<div id="navbar-container"></div>


<div class="container mt-5 mb-5">
  <div class="row justify-content-center">
    <div class="col-md-8">

      <div class="card shadow-lg border-0">
        <div class="card-header bg-primary text-white text-center">
          <h4 class="mb-0">Nuevo Cliente</h4>
        </div>

        <div class="card-body">




          <form>
            <div class="form-row">
              <div class="form-group col-md-6">
                <label for="inputPassword4">Nombre</label>
                <input type="text" class="form-control" placeholder="Ingrese su nombre">
              </div>

              <div class="form-group col-md-6">
                <label for="inputPassword4">Apellido</label>
                <input type="text" class="form-control" placeholder="Ingrese su apellido">
              </div>




              <div class="form-group col-md-6">
                <label for="inputEmail4">Email</label>
                <input type="email" class="form-control" placeholder="Email">
              </div>




              <div class="form-group col-md-6">
                <label for="inputEmail4">Contraseña</label>
                <input type="password" class="form-control" placeholder="Escribe la contraseña">
              </div>

            </div>


            <div class="form-row">
              <div class="form-group col-md-6">
                <label for="inputState">Tipo de documento</label>
                <select id="inputState" class="form-control">
                  <option selected>Selecciona...</option>
                  <option value="antioquia">C.C</option>
                  <option value="valle">C.E</option>
                  <option value="cundinamarca">PEP</option>
                  <option value="atlantico">PPT</option>
                </select>
              </div>
              <div class="form-group col-md-6">
                <label for="inputPassword4">Número de Documento</label>
                <input type="number" class="form-control" placeholder="">
              </div>


            </div>

            <div class="form-group">
              <label for="inputAddress">Dirección</label>
              <input type="text" class="form-control" id="inputAddress" placeholder="1234 Main St">
            </div>
            <div class="form-group">
              <label for="inputAddress2">Complemento</label>
              <input type="text" class="form-control" id="inputAddress2" placeholder="Apartmento, Casa, Edificio...">
            </div>
            <div class="form-row">
              <div class="form-group col-md-6">
                <label for="inputCity">Ciudad</label>
                <input type="text" class="form-control" id="inputCity">
              </div>


              <div class="form-group col-md-4">
                <label for="inputState">Departamento</label>
                <select id="inputState" class="form-control">
                  <option selected>Selecciona...</option>
                  <option value="antioquia">Antioquia (Medellín)</option>
                  <option value="valle">Valle del Cauca (Cali)</option>
                  <option value="cundinamarca">Cundinamarca (Bogotá)</option>
                  <option value="atlantico">Atlántico (Barranquilla)</option>
                  <option value="santander">Santander (Bucaramanga)</option>
                  <option value="bolivar">Bolívar (Cartagena)</option>
                  <option value="tolima">Tolima (Ibagué)</option>
                  <option value="cordoba">Córdoba (Montería)</option>
                  <option value="norte_santander">Norte de Santander (Cúcuta)</option>
                  <option value="risaralda">Risaralda (Pereira)</option>
                </select>
              </div>

              <div class="form-group col-md-2">
                <label for="inputZip">Código Postal</label>
                <input type="text" class="form-control" id="inputZip">
              </div>
            </div>
            <div class="form-group">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="gridCheck">
                <label class="form-check-label" for="gridCheck">
                  Estoy de acuerdo con los terminos y condiciones
                </label>
              </div>
            </div>
            <button type="submit" class="btn btn-primary">Registrar Cliente</button>
          </form>

        </div>
      </div>

    </div>
  </div>
</div>

{% endblock contenido %}
